services:
  # Backend API NestJS
  - type: web
    name: clinikdia-api
    runtime: node
    plan: free
    buildCommand: npm --prefix server install && npm --prefix server run build
    startCommand: npm --prefix server run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinikdia-db
          property: connectionString
      - key: JWT_SECRET
        # À générer et mettre manuellement
        sync: false

  # Base de données PostgreSQL
  - type: pserv
    name: clinikdia-db
    plan: free
    ipAllowList: []

# À faire manuellement sur Netlify pour le frontend
# Netlify buildCommand: npm run build
# Netlify publish: dist
# Netlify env: VITE_API_BASE=https://clinikdia-api.onrender.com
